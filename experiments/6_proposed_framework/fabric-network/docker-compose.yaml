## =============================================================
##  docker-compose.yaml  — Hyperledger Fabric 2.5
##  Hierarchical Clustered FL: 3 Orderers, 6 Peers, 6 CouchDBs, CLI
## =============================================================

version: '3.7'

volumes:
  orderer0.orderer.fabricfl.com:
  orderer1.orderer.fabricfl.com:
  orderer2.orderer.fabricfl.com:
  peer0.banka.fabricfl.com:
  peer1.banka.fabricfl.com:
  peer0.bankb.fabricfl.com:
  peer1.bankb.fabricfl.com:
  peer0.bankc.fabricfl.com:
  peer1.bankc.fabricfl.com:
  couchdb0.banka:
  couchdb1.banka:
  couchdb0.bankb:
  couchdb1.bankb:
  couchdb0.bankc:
  couchdb1.bankc:

networks:
  fabric_network:
    name: fabric_network

# ─────────────────────────────────────────────────────────────────────────────
#  Shared base config sections (YAML anchors)
# ─────────────────────────────────────────────────────────────────────────────
x-orderer-env: &orderer-env
  FABRIC_LOGGING_SPEC: INFO
  ORDERER_GENERAL_LISTENADDRESS: 0.0.0.0
  ORDERER_GENERAL_LISTENPORT: 7050
  ORDERER_GENERAL_LOCALMSPID: OrdererMSP
  ORDERER_GENERAL_TLS_ENABLED: "true"
  ORDERER_GENERAL_TLS_PRIVATEKEY: /var/hyperledger/orderer/tls/server.key
  ORDERER_GENERAL_TLS_CERTIFICATE: /var/hyperledger/orderer/tls/server.crt
  ORDERER_GENERAL_TLS_ROOTCAS: '[/var/hyperledger/orderer/tls/ca.crt]'
  ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE: /var/hyperledger/orderer/tls/server.crt
  ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY: /var/hyperledger/orderer/tls/server.key
  ORDERER_GENERAL_CLUSTER_ROOTCAS: '[/var/hyperledger/orderer/tls/ca.crt]'
  ORDERER_GENERAL_BOOTSTRAPMETHOD: none
  ORDERER_CHANNELPARTICIPATION_ENABLED: "true"
  ORDERER_ADMIN_TLS_ENABLED: "true"
  ORDERER_ADMIN_TLS_CERTIFICATE: /var/hyperledger/orderer/tls/server.crt
  ORDERER_ADMIN_TLS_PRIVATEKEY: /var/hyperledger/orderer/tls/server.key
  ORDERER_ADMIN_TLS_ROOTCAS: '[/var/hyperledger/orderer/tls/ca.crt]'
  ORDERER_ADMIN_TLS_CLIENTROOTCAS: '[/var/hyperledger/orderer/tls/ca.crt]'
  ORDERER_ADMIN_LISTENADDRESS: 0.0.0.0:7053

services:

  ##############################################################################
  #  ORDERER NODES  (3-node Raft for fault-tolerant ordering)
  ##############################################################################

  orderer0.orderer.fabricfl.com:
    container_name: orderer0.orderer.fabricfl.com
    image: hyperledger/fabric-orderer:${IMAGE_TAG}
    environment:
      <<: *orderer-env
      ORDERER_GENERAL_LOCALMSPDIR: /var/hyperledger/orderer/msp
      ORDERER_ADMIN_LISTENADDRESS: 0.0.0.0:7053
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric
    command: orderer
    volumes:
      - ./crypto-config/ordererOrganizations/orderer.fabricfl.com/orderers/orderer0.orderer.fabricfl.com/msp:/var/hyperledger/orderer/msp
      - ./crypto-config/ordererOrganizations/orderer.fabricfl.com/orderers/orderer0.orderer.fabricfl.com/tls:/var/hyperledger/orderer/tls
      - orderer0.orderer.fabricfl.com:/var/hyperledger/production/orderer
      - ./channel-artifacts:/var/hyperledger/fabric/channelartifacts
    ports:
      - "7050:7050"
      - "7053:7053"
    networks:
      - fabric_network

  orderer1.orderer.fabricfl.com:
    container_name: orderer1.orderer.fabricfl.com
    image: hyperledger/fabric-orderer:${IMAGE_TAG}
    environment:
      <<: *orderer-env
      ORDERER_GENERAL_LOCALMSPDIR: /var/hyperledger/orderer/msp
      ORDERER_ADMIN_LISTENADDRESS: 0.0.0.0:8053
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric
    command: orderer
    volumes:
      - ./crypto-config/ordererOrganizations/orderer.fabricfl.com/orderers/orderer1.orderer.fabricfl.com/msp:/var/hyperledger/orderer/msp
      - ./crypto-config/ordererOrganizations/orderer.fabricfl.com/orderers/orderer1.orderer.fabricfl.com/tls:/var/hyperledger/orderer/tls
      - orderer1.orderer.fabricfl.com:/var/hyperledger/production/orderer
      - ./channel-artifacts:/var/hyperledger/fabric/channelartifacts
    ports:
      - "8050:7050"
      - "8053:8053"
    networks:
      - fabric_network

  orderer2.orderer.fabricfl.com:
    container_name: orderer2.orderer.fabricfl.com
    image: hyperledger/fabric-orderer:${IMAGE_TAG}
    environment:
      <<: *orderer-env
      ORDERER_GENERAL_LOCALMSPDIR: /var/hyperledger/orderer/msp
      ORDERER_ADMIN_LISTENADDRESS: 0.0.0.0:9053
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric
    command: orderer
    volumes:
      - ./crypto-config/ordererOrganizations/orderer.fabricfl.com/orderers/orderer2.orderer.fabricfl.com/msp:/var/hyperledger/orderer/msp
      - ./crypto-config/ordererOrganizations/orderer.fabricfl.com/orderers/orderer2.orderer.fabricfl.com/tls:/var/hyperledger/orderer/tls
      - orderer2.orderer.fabricfl.com:/var/hyperledger/production/orderer
      - ./channel-artifacts:/var/hyperledger/fabric/channelartifacts
    ports:
      - "9050:7050"
      - "9053:9053"
    networks:
      - fabric_network

  ##############################################################################
  #  COUCHDB INSTANCES  (one per peer for rich state queries)
  ##############################################################################

  couchdb0.banka:
    container_name: couchdb0.banka
    image: couchdb:3.3.2
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - "5984:5984"
    volumes:
      - couchdb0.banka:/opt/couchdb/data
    networks:
      - fabric_network

  couchdb1.banka:
    container_name: couchdb1.banka
    image: couchdb:3.3.2
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - "6984:5984"
    volumes:
      - couchdb1.banka:/opt/couchdb/data
    networks:
      - fabric_network

  couchdb0.bankb:
    container_name: couchdb0.bankb
    image: couchdb:3.3.2
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - "7984:5984"
    volumes:
      - couchdb0.bankb:/opt/couchdb/data
    networks:
      - fabric_network

  couchdb1.bankb:
    container_name: couchdb1.bankb
    image: couchdb:3.3.2
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - "8984:5984"
    volumes:
      - couchdb1.bankb:/opt/couchdb/data
    networks:
      - fabric_network

  couchdb0.bankc:
    container_name: couchdb0.bankc
    image: couchdb:3.3.2
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - "9984:5984"
    volumes:
      - couchdb0.bankc:/opt/couchdb/data
    networks:
      - fabric_network

  couchdb1.bankc:
    container_name: couchdb1.bankc
    image: couchdb:3.3.2
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - "10984:5984"
    volumes:
      - couchdb1.bankc:/opt/couchdb/data
    networks:
      - fabric_network

  ##############################################################################
  #  BANK A PEERS
  #  peer0 = HQ (primary committee member / anchor peer)
  #  peer1 = Backup HQ
  ##############################################################################

  peer0.banka.fabricfl.com:
    container_name: peer0.banka.fabricfl.com
    image: hyperledger/fabric-peer:${IMAGE_TAG}
    environment:
      #── Identity ──────────────────────────────────────────────
      - CORE_PEER_ID=peer0.banka.fabricfl.com
      - CORE_PEER_LOCALMSPID=BankAMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      #── Networking ────────────────────────────────────────────
      - CORE_PEER_ADDRESS=peer0.banka.fabricfl.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.banka.fabricfl.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      #── Gossip: peer0 bootstraps from itself (it IS the anchor) ─
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.banka.fabricfl.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.banka.fabricfl.com:7051
      - CORE_PEER_GOSSIP_USELEADERELECTION=true
      - CORE_PEER_GOSSIP_ORGLEADER=false
      #── TLS ───────────────────────────────────────────────────
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      #── State DB: CouchDB for rich queries on trust scores ────
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb0.banka:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
      #── Logging ───────────────────────────────────────────────
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_PROFILE_ENABLED=false
      #── Chaincode builder: use host Docker socket ─────────────
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=fabric_network
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    volumes:
      - ./crypto-config/peerOrganizations/banka.fabricfl.com/peers/peer0.banka.fabricfl.com/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/banka.fabricfl.com/peers/peer0.banka.fabricfl.com/tls:/etc/hyperledger/fabric/tls
      - peer0.banka.fabricfl.com:/var/hyperledger/production
      - /var/run/docker.sock:/host/var/run/docker.sock
    ports:
      - "7051:7051"
    depends_on:
      - couchdb0.banka
    networks:
      - fabric_network

  peer1.banka.fabricfl.com:
    container_name: peer1.banka.fabricfl.com
    image: hyperledger/fabric-peer:${IMAGE_TAG}
    environment:
      - CORE_PEER_ID=peer1.banka.fabricfl.com
      - CORE_PEER_LOCALMSPID=BankAMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_PEER_ADDRESS=peer1.banka.fabricfl.com:7061
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7061
      - CORE_PEER_CHAINCODEADDRESS=peer1.banka.fabricfl.com:7062
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7062
      # Backup HQ bootstraps from peer0 (HQ)
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.banka.fabricfl.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer1.banka.fabricfl.com:7061
      - CORE_PEER_GOSSIP_USELEADERELECTION=true
      - CORE_PEER_GOSSIP_ORGLEADER=false
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb1.banka:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=fabric_network
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    volumes:
      - ./crypto-config/peerOrganizations/banka.fabricfl.com/peers/peer1.banka.fabricfl.com/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/banka.fabricfl.com/peers/peer1.banka.fabricfl.com/tls:/etc/hyperledger/fabric/tls
      - peer1.banka.fabricfl.com:/var/hyperledger/production
      - /var/run/docker.sock:/host/var/run/docker.sock
    ports:
      - "7061:7061"
    depends_on:
      - couchdb1.banka
    networks:
      - fabric_network

  ##############################################################################
  #  BANK B PEERS
  ##############################################################################

  peer0.bankb.fabricfl.com:
    container_name: peer0.bankb.fabricfl.com
    image: hyperledger/fabric-peer:${IMAGE_TAG}
    environment:
      - CORE_PEER_ID=peer0.bankb.fabricfl.com
      - CORE_PEER_LOCALMSPID=BankBMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_PEER_ADDRESS=peer0.bankb.fabricfl.com:8051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:8051
      - CORE_PEER_CHAINCODEADDRESS=peer0.bankb.fabricfl.com:8052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:8052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.bankb.fabricfl.com:8051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.bankb.fabricfl.com:8051
      - CORE_PEER_GOSSIP_USELEADERELECTION=true
      - CORE_PEER_GOSSIP_ORGLEADER=false
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb0.bankb:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=fabric_network
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    volumes:
      - ./crypto-config/peerOrganizations/bankb.fabricfl.com/peers/peer0.bankb.fabricfl.com/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/bankb.fabricfl.com/peers/peer0.bankb.fabricfl.com/tls:/etc/hyperledger/fabric/tls
      - peer0.bankb.fabricfl.com:/var/hyperledger/production
      - /var/run/docker.sock:/host/var/run/docker.sock
    ports:
      - "8051:8051"
    depends_on:
      - couchdb0.bankb
    networks:
      - fabric_network

  peer1.bankb.fabricfl.com:
    container_name: peer1.bankb.fabricfl.com
    image: hyperledger/fabric-peer:${IMAGE_TAG}
    environment:
      - CORE_PEER_ID=peer1.bankb.fabricfl.com
      - CORE_PEER_LOCALMSPID=BankBMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_PEER_ADDRESS=peer1.bankb.fabricfl.com:8061
      - CORE_PEER_LISTENADDRESS=0.0.0.0:8061
      - CORE_PEER_CHAINCODEADDRESS=peer1.bankb.fabricfl.com:8062
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:8062
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.bankb.fabricfl.com:8051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer1.bankb.fabricfl.com:8061
      - CORE_PEER_GOSSIP_USELEADERELECTION=true
      - CORE_PEER_GOSSIP_ORGLEADER=false
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb1.bankb:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=fabric_network
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    volumes:
      - ./crypto-config/peerOrganizations/bankb.fabricfl.com/peers/peer1.bankb.fabricfl.com/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/bankb.fabricfl.com/peers/peer1.bankb.fabricfl.com/tls:/etc/hyperledger/fabric/tls
      - peer1.bankb.fabricfl.com:/var/hyperledger/production
      - /var/run/docker.sock:/host/var/run/docker.sock
    ports:
      - "8061:8061"
    depends_on:
      - couchdb1.bankb
    networks:
      - fabric_network

  ##############################################################################
  #  BANK C PEERS
  ##############################################################################

  peer0.bankc.fabricfl.com:
    container_name: peer0.bankc.fabricfl.com
    image: hyperledger/fabric-peer:${IMAGE_TAG}
    environment:
      - CORE_PEER_ID=peer0.bankc.fabricfl.com
      - CORE_PEER_LOCALMSPID=BankCMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_PEER_ADDRESS=peer0.bankc.fabricfl.com:9051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:9051
      - CORE_PEER_CHAINCODEADDRESS=peer0.bankc.fabricfl.com:9052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:9052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.bankc.fabricfl.com:9051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.bankc.fabricfl.com:9051
      - CORE_PEER_GOSSIP_USELEADERELECTION=true
      - CORE_PEER_GOSSIP_ORGLEADER=false
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb0.bankc:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=fabric_network
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    volumes:
      - ./crypto-config/peerOrganizations/bankc.fabricfl.com/peers/peer0.bankc.fabricfl.com/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/bankc.fabricfl.com/peers/peer0.bankc.fabricfl.com/tls:/etc/hyperledger/fabric/tls
      - peer0.bankc.fabricfl.com:/var/hyperledger/production
      - /var/run/docker.sock:/host/var/run/docker.sock
    ports:
      - "9051:9051"
    depends_on:
      - couchdb0.bankc
    networks:
      - fabric_network

  peer1.bankc.fabricfl.com:
    container_name: peer1.bankc.fabricfl.com
    image: hyperledger/fabric-peer:${IMAGE_TAG}
    environment:
      - CORE_PEER_ID=peer1.bankc.fabricfl.com
      - CORE_PEER_LOCALMSPID=BankCMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_PEER_ADDRESS=peer1.bankc.fabricfl.com:9061
      - CORE_PEER_LISTENADDRESS=0.0.0.0:9061
      - CORE_PEER_CHAINCODEADDRESS=peer1.bankc.fabricfl.com:9062
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:9062
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.bankc.fabricfl.com:9051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer1.bankc.fabricfl.com:9061
      - CORE_PEER_GOSSIP_USELEADERELECTION=true
      - CORE_PEER_GOSSIP_ORGLEADER=false
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb1.bankc:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=fabric_network
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    volumes:
      - ./crypto-config/peerOrganizations/bankc.fabricfl.com/peers/peer1.bankc.fabricfl.com/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/bankc.fabricfl.com/peers/peer1.bankc.fabricfl.com/tls:/etc/hyperledger/fabric/tls
      - peer1.bankc.fabricfl.com:/var/hyperledger/production
      - /var/run/docker.sock:/host/var/run/docker.sock
    ports:
      - "9061:9061"
    depends_on:
      - couchdb1.bankc
    networks:
      - fabric_network

  ##############################################################################
  #  CLI  — fabric-tools for running admin scripts inside the network
  ##############################################################################
  cli:
    container_name: cli
    image: hyperledger/fabric-tools:${IMAGE_TAG}
    tty: true
    stdin_open: true
    environment:
      # Default context: BankA Admin on peer0 (HQ)
      - GOPATH=/opt/gopath
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=cli
      - CORE_PEER_ADDRESS=peer0.banka.fabricfl.com:7051
      - CORE_PEER_LOCALMSPID=BankAMSP
      - CORE_PEER_TLS_ENABLED=true
